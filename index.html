                { day: 10, grain: "잡곡밥 60, 기장 10", meat: "소고기 10 이상 (3회분)", toppings: "배추 10, 오이 10, 브로콜리 10, 팽이버섯 10, 양파 10", allergy: null, new: ["양파 10"] },
                { day: 11, grain: "잡곡밥 60, 렌틸콩 10", meat: "소고기 10 이상 (3회분)", toppings: "배추 10, 오이 10, 브로콜리 10, 팽이버섯 10, 양파 10", allergy: null, new: ["렌틸콩 10"] },
                { day: 12, grain: "잡곡밥 60, 렌틸콩 10", meat: "소고기 10 이상 (3회분)", toppings: "배추 10, 오이 10, 브로콜리 10, 팽이버섯 10, 양파 10", allergy: null, new: [] },
                { day: 13, grain: "잡곡밥 60, 렌틸콩 10", meat: "소고기 10 이상 (3회분)", toppings: "비트 10, 단호박 10, 양배추 10, 양파 10, 대게 10", allergy: null, new: ["대게 10"] },
                { day: 14, grain: "잡곡밥 60, 렌틸콩 10", meat: "소고기 10 이상 (3회분)", toppings: "비트 10, 단호박 10, 양배추 10, 양파 10, 대게 10", allergy: null, new: [] },
                { day: 15, grain: "잡곡밥 60, 렌틸콩 10", meat: "소고기 10 이상 (3회분)", toppings: "비트 10, 단호박 10, 양배추 10, 양파 10, 대게 10", allergy: null, new: [] },
                { day: 16, grain: "잡곡밥 70, 차조 10", meat: "소고기 10 이상 (3회분)", toppings: "느타리 10, 콜리플라워 10, 시금치 10, 양파 10, 대게 10", allergy: null, new: ["차조 10"] },
                { day: 17, grain: "잡곡밥 70, 차조 10", meat: "소고기 10 이상 (3회분)", toppings: "느타리 10, 콜리플라워 10, 시금치 10, 연근 10", allergy: null, new: ["연근 10"] },
                { day: 18, grain: "잡곡밥 70, 차조 10", meat: "소고기 10 이상 (3회분)", toppings: "느타리 10, 콜리플라워 10, 시금치 10, 연근 10", allergy: null, new: [] },
                { day: 19, grain: "잡곡밥 70, 차조 10", meat: "소고기 10 이상 (3회분)", toppings: "느타리 10, 콜리플라워 10, 시금치 10, 연근 10, 옥수수 10", allergy: null, new: ["옥수수 10"] },
                { day: 20, grain: "잡곡밥 70, 차조 10", meat: "소고기 10 이상 (3회분)", toppings: "느타리 10, 콜리플라워 10, 시금치 10, 연근 10, 옥수수 10", allergy: null, new: [] },
                { day: 21, grain: "잡곡밥 70, 흑미 10", meat: "소고기 10 이상 (3회분)", toppings: "고구마 10, 새송이버섯 10, 당근 10, 연근 10, 옥수수 10", allergy: null, new: ["흑미 10"] },
                { day: 22, grain: "잡곡밥 70, 흑미 10", meat: "소고기 10 이상 (3회분)", toppings: "고구마 10, 새송이버섯 10, 당근 10, 아스파라거스 10, 옥수수 10", allergy: null, new: ["아스파라거스 10"] },
                { day: 23, grain: "잡곡밥 70, 흑미 10", meat: "소고기 10 이상 (3회분)", toppings: "고구마 10, 새송이버섯 10, 당근 10, 아스파라거스 10, 옥수수 10", allergy: null, new: [] },
                { day: 24, grain: "잡곡밥 70, 흑미 10", meat: "소고기 10 이상 (3회분)", toppings: "고구마 10, 새송이버섯 10, 당근 10, 아스파라거스 10, 대구 10", allergy: null, new: ["대구 10"] },
                { day: 25, grain: "잡곡밥 70, 흑미 10", meat: "소고기 10 이상 (3회분)", toppings: "고구마 10, 새송이버섯 10, 당근 10, 아스파라거스 10, 대구 10", allergy: null, new: [] },
                { day: 26, grain: "잡곡밥 70, 강낭콩 10", meat: "소고기 10 이상 (3회분)", toppings: "가지 10, 무 10, 오이 10, 아스파라거스 10, 표고버섯 10", allergy: null, new: ["강낭콩 10", "표고버섯 10"] },
                { day: 27, grain: "잡곡밥 70, 강낭콩 10", meat: "소고기 10 이상 (3회분)", toppings: "가지 10, 무 10, 오이 10, 아스파라거스 10, 표고버섯 10", allergy: null, new: [] },
                { day: 28, grain: "잡곡밥 70, 강낭콩 10", meat: "소고기 10 이상 (3회분)", toppings: "가지 10, 무 10, 오이 10, 아스파라거스 10, 표고버섯 10", allergy: null, new: [] },
                { day: 29, grain: "잡곡밥 70, 강낭콩 10", meat: "소고기 10 이상 (3회분)", toppings: "손유 10, 감자 10, 단호박 10, 청경채 10, 표고버섯 10, 샐러리 10", allergy: null, new: ["샐러리 10"] },
                { day: 30, grain: "잡곡밥 70, 강낭콩 10", meat: "소고기 10 이상 (3회분)", toppings: "손유 10, 감자 10, 단호박 10, 청경채 10, 표고버섯 10, 샐러리 10", allergy: null, new: [] },
            ];

            const currentData = useMemo(() => {
                if (activeTab === 'early') return earlyData;
                if (activeTab === 'mid1') return mid1Data;
                return mid2Data;
            }, [activeTab]);

            const today = new Date(); today.setHours(0,0,0,0);
            const daysFromStart = Math.floor((today.getTime() - START_DATE.getTime()) / (1000*60*60*24));

            const paddingCells = Array.from({ length: getFormattedDate(activeTab === 'early' ? 0 : activeTab === 'mid1' ? 30 : 60).dayOfWeek }, (_, i) => i);

            const handleCalendarDayClick = (item) => {
                if (window.innerWidth < 1024) {
                    setViewMode('focus');
                    setTimeout(() => {
                        const el = document.getElementById(`day-card-${item.day}`);
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }, 100);
                } else {
                    setSelectedDay(item);
                }
            };

            useEffect(() => {
                window.scrollTo(0, 0);
                if (listRef.current) listRef.current.scrollTop = 0;
            }, [activeTab]);

            useEffect(() => {
                if (viewMode === 'focus' && todayRef.current) {
                    const timer = setTimeout(() => { todayRef.current.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 400);
                    return () => clearTimeout(timer);
                }
            }, [viewMode, activeTab]);

            return (
                <div className="min-h-screen pb-12 text-slate-800">
                    <div className="max-w-4xl mx-auto space-y-4">
                        {/* 상단 섹션 */}
                        <div className="bg-white rounded-b-3xl md:rounded-3xl p-6 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4 border-b md:border border-slate-200">
                            <div className="flex items-center space-x-4 text-center md:text-left">
                                <div className="p-3 bg-pink-500 rounded-2xl text-white shadow-lg shadow-pink-100"><Icons.Baby size={32} /></div>
                                <div>
                                    <h1 className="text-xl md:text-2xl font-black tracking-tight">우리 윤서❤️ 이유식 식단표</h1>
                                    <p className="text-xs text-slate-400 font-medium tracking-tight">✨ NEW: 처음 먹는 재료 • 정밀 검증 완료</p>
                                </div>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-2xl w-full md:w-auto">
                                {['early', 'mid1', 'mid2'].map(k => (
                                    <button key={k} onClick={() => setActiveTab(k)} className={`flex-1 md:px-6 py-2 rounded-xl text-xs md:text-sm font-bold transition-all ${activeTab === k ? 'bg-white text-slate-800 shadow-sm' : 'text-slate-400'}`}>
                                        {k === 'early' ? '초기' : k === 'mid1' ? '중기1' : '중기2'}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* 모드 전환 */}
                        <div className="flex justify-end px-4 gap-2">
                            <button onClick={() => setViewMode('calendar')} className={`text-[11px] font-bold px-4 py-2 rounded-xl shadow-sm border transition-all ${viewMode === 'calendar' ? 'bg-pink-600 text-white border-pink-600' : 'bg-white text-slate-400 border-slate-200'}`}>달력으로 보기</button>
                            <button onClick={() => setViewMode('focus')} className={`text-[11px] font-bold px-4 py-2 rounded-xl shadow-sm border transition-all ${viewMode === 'focus' ? 'bg-pink-600 text-white border-pink-600' : 'bg-white text-slate-400 border-slate-200'}`}>리스트로 보기</button>
                        </div>

                        {/* 리스트 모드 */}
                        <div ref={listRef} className={`${viewMode === 'focus' ? 'block' : 'hidden'} space-y-4 px-4 pb-20 no-scrollbar overflow-y-auto max-h-[calc(100vh-180px)] md:max-h-none`}>
                            {currentData.map((item, idx) => {
                                const dateInfo = getFormattedDate(activeTab === 'early' ? idx : activeTab === 'mid1' ? idx + 30 : idx + 60);
                                const isToday = (activeTab === 'early' && idx === daysFromStart) || (activeTab === 'mid1' && idx + 30 === daysFromStart) || (activeTab === 'mid2' && idx + 60 === daysFromStart);
                                return (
                                    <div key={idx} id={`day-card-${item.day}`} ref={isToday ? todayRef : null} className={`bg-white rounded-[2.5rem] p-6 shadow-sm border border-slate-200 flex flex-col gap-4 transition-all ${isToday ? 'today-card' : 'opacity-80 md:opacity-100 scale-95 md:scale-100'}`}>
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center gap-2">
                                                {isToday && <span className="text-[10px] font-black px-3 py-1 rounded-full bg-pink-600 text-white uppercase tracking-tighter">TODAY</span>}
                                                <span className="text-base font-black">{dateInfo.full}</span>
                                            </div>
                                            <span className="text-[10px] font-bold text-pink-400 bg-pink-50 px-2 py-1 rounded-md tracking-tighter italic">D+{item.day}</span>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-2 text-left">
                                            <div className="flex items-center bg-amber-50/50 p-4 rounded-3xl border border-amber-100 shadow-sm">
                                                <div className="w-10 h-10 bg-amber-100 rounded-2xl flex items-center justify-center mr-4 text-xl shadow-inner">🍚</div>
                                                <div className="flex-1">
                                                    <p className="text-[10px] font-bold text-amber-500 uppercase tracking-tighter">곡류</p>
                                                    <p className="text-sm font-black text-slate-700 leading-tight">
                                                        {item.grain} {item.new?.some(n => item.grain.includes(n.split(' ')[0])) && <span className="ml-1 text-xs text-amber-600 font-black tracking-tighter italic">✨ NEW</span>}
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="flex items-center bg-red-50/50 p-4 rounded-3xl border border-red-100 shadow-sm">
                                                <div className="w-10 h-10 bg-red-100 rounded-2xl flex items-center justify-center mr-4 text-xl shadow-inner">🥩</div>
                                                <div className="flex-1">
                                                    <p className="text-[10px] font-bold text-red-500 uppercase tracking-tighter">고기류</p>
                                                    <p className="text-sm font-black text-slate-700 leading-tight">
                                                        {item.meat} {item.new?.some(n => item.meat.includes(n.split(' ')[0])) && <span className="ml-1 text-xs text-red-600 font-black tracking-tighter italic">✨ NEW</span>}
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="flex items-center bg-emerald-50/50 p-4 rounded-3xl border border-emerald-100 shadow-sm">
                                                <div className="w-10 h-10 bg-emerald-100 rounded-2xl flex items-center justify-center mr-4 text-xl shadow-inner">🥦</div>
                                                <div className="flex-1">
                                                    <p className="text-[10px] font-bold text-emerald-500 uppercase tracking-tighter">토핑류</p>
                                                    <p className="text-sm font-black text-slate-700 leading-tight">
                                                        {item.toppings} {item.new?.some(n => item.toppings.includes(n.split(' ')[0])) && <span className="ml-1 text-xs text-emerald-600 font-black tracking-tighter italic">✨ NEW</span>}
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                        {item.allergy && <div className="bg-red-500 text-white p-4 rounded-3xl flex items-center gap-3 shadow-lg shadow-red-100"><Icons.AlertCircle size={20} /><span className="text-sm font-black">{item.allergy} 반응 체크!</span></div>}
                                    </div>
                                );
                            })}
                        </div>

                        {/* 달력 모드 */}
                        <div className={`${viewMode === 'calendar' ? 'block' : 'hidden'} px-4 md:px-0`}>
                            <div className="bg-white rounded-[2.5rem] p-4 md:p-8 shadow-sm border border-slate-200">
                                <div className="grid grid-cols-7 mb-4 border-b border-slate-50 pb-4">
                                    {['일','월','화','수','목','금','토'].map((d,i)=><div key={d} className={`text-center text-[11px] font-black uppercase ${i===0?'text-red-400':i===6?'text-blue-400':'text-slate-400'}`}>{d}</div>)}
                                </div>
                                <div className="grid grid-cols-7 gap-1 md:gap-3">
                                    {paddingCells.map((_,i)=><div key={i} className="calendar-cell bg-slate-50/50 rounded-2xl border border-transparent"></div>)}
                                    {currentData.map((item, idx)=>(
                                        <button key={idx} onClick={()=>handleCalendarDayClick(item)} className={`calendar-cell relative p-1 md:p-3 rounded-2xl border flex flex-col transition-all active:scale-95 ${((activeTab==='early'&&idx===daysFromStart)||(activeTab==='mid1'&&idx+30===daysFromStart)||(activeTab==='mid2'&&idx+60===daysFromStart))?'border-pink-500 ring-2 ring-pink-50 shadow-inner':'border-slate-100 bg-white hover:border-slate-300'}`}>
                                            <div className="flex justify-between items-start mb-2">
                                                <span className={`text-[10px] md:text-sm font-black ${getFormattedDate(activeTab==='early'?idx:activeTab==='mid1'?idx+30:idx+60).isSunday?'text-red-400':getFormattedDate(activeTab==='early'?idx:activeTab==='mid1'?idx+30:idx+60).isSaturday?'text-blue-500':'text-slate-400'}`}>{getFormattedDate(activeTab==='early'?idx:activeTab==='mid1'?idx+30:idx+60).date}</span>
                                                {item.new?.length > 0 && <Icons.Sparkle size={10} className="text-yellow-400 animate-pulse" />}
                                            </div>
                                            <div className="flex-1 space-y-1 overflow-hidden text-left">
                                                <div className={`text-tiny font-black truncate ${item.new?.some(n => item.grain.includes(n.split(' ')[0])) ? 'text-amber-600' : 'text-slate-800'}`}>🍚{shortenText(item.grain)}</div>
                                                {item.meat!=='-' && <div className={`text-tiny font-black truncate ${item.new?.some(n => item.meat.includes(n.split(' ')[0])) ? 'text-pink-600' : 'text-red-600'}`}>🥩{shortenText(item.meat)}</div>}
                                                {item.toppings!=='-' && <div className={`text-tiny font-bold truncate leading-tight ${item.new?.some(n => item.toppings.includes(n.split(' ')[0])) ? 'text-indigo-600 font-black' : 'text-emerald-600'}`}>🥦{shortenText(item.toppings)}</div>}
                                            </div>
                                            <div className="absolute bottom-1 right-2 text-[8px] font-black text-slate-200 opacity-50 uppercase tracking-tighter">D{item.day}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        {/* PC용 상세 팝업 */}
                        {selectedDay && (
                            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[200] flex items-center justify-center p-4" onClick={()=>setSelectedDay(null)}>
                                <div className="bg-white rounded-[3.5rem] p-8 w-full max-w-2xl shadow-2xl animate-in zoom-in-95 duration-200" onClick={e=>e.stopPropagation()}>
                                    <div className="flex justify-between mb-8 items-start">
                                        <div><p className="text-xs font-black text-pink-500 uppercase mb-1 tracking-widest tracking-tighter">Day {selectedDay.day}</p><h3 className="text-4xl font-black tracking-tighter">{getFormattedDate(activeTab==='early'?selectedDay.day-1:activeTab==='mid1'?selectedDay.day+29:selectedDay.day+59).full}</h3></div>
                                        <button onClick={()=>setSelectedDay(null)} className="p-3 bg-slate-100 rounded-full hover:bg-slate-200">✕</button>
                                    </div>
                                    <div className="grid grid-cols-1 gap-4">
                                        <div className="p-6 rounded-[2.5rem] bg-amber-50 border border-amber-100 flex items-center justify-between shadow-sm">
                                            <div className="flex items-center"><div className="w-14 h-14 bg-amber-100 rounded-3xl flex items-center justify-center mr-6 text-3xl shadow-sm">🍚</div><div><p className="text-xs font-black text-amber-500 uppercase mb-1">베이스 곡류</p><p className="text-xl font-black text-slate-700 leading-tight">{selectedDay.grain}</p></div></div>
                                            {selectedDay.new?.some(n => selectedDay.grain.includes(n.split(' ')[0])) && <span className="new-badge px-4 py-2 rounded-full text-xs tracking-widest italic uppercase font-black">✨ NEW</span>}
                                        </div>
                                        <div className="p-6 rounded-[2.5rem] bg-red-50 border border-red-100 flex items-center justify-between shadow-sm">
                                            <div className="flex items-center"><div className="w-14 h-14 bg-red-100 rounded-3xl flex items-center justify-center mr-6 text-3xl shadow-sm">🥩</div><div><p className="text-xs font-black text-red-500 uppercase mb-1">단백질 고기</p><p className="text-xl font-black text-slate-700 leading-tight">{selectedDay.meat}</p></div></div>
                                            {selectedDay.new?.some(n => selectedDay.meat.includes(n.split(' ')[0])) && <span className="new-badge px-4 py-2 rounded-full text-xs tracking-widest italic uppercase font-black">✨ NEW</span>}
                                        </div>
                                        <div className="p-6 rounded-[2.5rem] bg-emerald-50 border border-emerald-100 flex items-center justify-between shadow-sm">
                                            <div className="flex items-center"><div className="w-14 h-14 bg-emerald-100 rounded-3xl flex items-center justify-center mr-6 text-3xl shadow-sm">🥦</div><div><p className="text-xs font-black text-emerald-500 uppercase mb-1">야채 토핑</p><p className="text-xl font-black text-slate-700 leading-tight">{selectedDay.toppings}</p></div></div>
                                            {selectedDay.new?.some(n => selectedDay.toppings.includes(n.split(' ')[0])) && <span className="new-badge px-4 py-2 rounded-full text-xs tracking-widest italic uppercase font-black">✨ NEW</span>}
                                        </div>
                                    </div>
                                    {selectedDay.allergy && <div className="mt-8 p-6 bg-red-600 text-white rounded-[2.5rem] flex items-center shadow-xl shadow-red-200"><Icons.AlertCircle size={32} className="mr-5 shrink-0" /><div><p className="text-lg font-black">{selectedDay.allergy} 알레르기 테스트 예정</p><p className="text-sm opacity-90 font-medium leading-relaxed text-red-100">새로운 식재료에 대한 아기의 반응을 꼼꼼하게 관찰해 주세요.</p></div></div>}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
